# ===============================
# ⚙️ CONFIGURATION BASE DE DONNÉES
# ===============================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/bqxx8drhv8wljcabp73b?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de connexions Hikari
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# ⚙️ CONFIGURATION JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# Hibernate détectera automatiquement le charset utf8mb4 des tables

# ===============================
# ⚙️ ENCODAGE UTF-8 (HTTP + JSON)
# ===============================
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# ===============================
# ⚙️ APPLICATION
# ===============================
spring.application.name=fasocarbu
server.port=9090

# ===============================
# 🔐 JWT
# ===============================
fasocarbu.jwtSecret=VotreCleSecreteSuperSecureDauMoins32Caracteres
fasocarbu.jwtExpirationMs=86400000


# ===============================
# 🪵 LOGGING
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.com.fasocarbu=DEBUG
logging.file.name=application.log

